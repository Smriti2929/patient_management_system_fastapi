version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: patient-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Smriti@29
      POSTGRES_DB: patient_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: patient-redis

    ports:
      - "6379:6379"

  api:

    build: .

    container_name: patient-api

    ports:
      - "8000:8000"

    depends_on:
      - postgres
      - redis

    environment:

      DATABASE_URL: postgresql://postgres:Smriti%4029@postgres:5432/patient_db
      REDIS_URL: redis://redis:6379/0

  celery:

    build: .

    container_name: patient-worker

    command: celery -A app.celery_app worker --pool=solo --loglevel=info

    depends_on:
      - redis
      - postgres

    environment:

      DATABASE_URL: postgresql://postgres:Smriti%4029@postgres:5432/patient_db
      REDIS_URL: redis://redis:6379/0

volumes:

  postgres_data: